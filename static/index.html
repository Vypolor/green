<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      font-size: 14px;
      background: #fff;
      color: #222;
      padding: 40px;
    }

    .layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 320px;
      flex-shrink: 0;
    }

    .right {
      flex: 1;
    }

    input, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #888;
    }

    textarea {
      resize: vertical;
    }

    .divider {
      height: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #f5f5f5;
    }

    button:active {
      background: #ebebeb;
    }

    .response-label {
      font-size: 15px;
      margin-bottom: 8px;
      color: #333;
    }

    #response {
      width: 100%;
      min-height: 320px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      background: #fafafa;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left">
      <input id="idInstance" type="text" placeholder="idInstance" />
      <input id="apiToken" type="text" placeholder="ApiTokenInstance" />

      <div class="divider"></div>

      <button onclick="call('getSettings')">getSettings</button>
      <button onclick="call('getStateInstance')">getStateInstance</button>

      <div class="divider"></div>

      <input id="phoneMessage" type="text" placeholder="7777234567" />
      <textarea id="message" rows="3" placeholder="Hello World!"></textarea>
      <button onclick="call('sendMessage')">sendMessage</button>

      <div class="divider"></div>

      <input id="phoneFile" type="text" placeholder="7777234567" />
      <input id="fileUrl" type="text" placeholder="https://my.site.com/img/horse.png" />
      <button onclick="call('sendFileByUrl')">sendFileByUrl</button>
    </div>

    <div class="right">
      <div class="response-label">Ответ:</div>
      <div id="response"></div>
    </div>
  </div>

  <script>
    function getBase() {
      return {
        idInstance: document.getElementById('idInstance').value.trim(),
        apiTokenInstance: document.getElementById('apiToken').value.trim(),
      };
    }

    function showResponse(data) {
      document.getElementById('response').textContent =
        JSON.stringify(data, null, 2);
    }

    async function call(method) {
      const base = getBase();
      if (!base.idInstance || !base.apiTokenInstance) {
        showResponse({ error: 'Заполните idInstance и ApiTokenInstance' });
        return;
      }

      let body;

      if (method === 'getSettings' || method === 'getStateInstance') {
        body = base;
      } else if (method === 'sendMessage') {
        const phone = document.getElementById('phoneMessage').value.trim();
        const message = document.getElementById('message').value.trim();
        if (!phone || !message) {
          showResponse({ error: 'Заполните номер телефона и сообщение' });
          return;
        }
        body = { ...base, chatId: phone + '@c.us', message };
      } else if (method === 'sendFileByUrl') {
        const phone = document.getElementById('phoneFile').value.trim();
        const urlFile = document.getElementById('fileUrl').value.trim();
        if (!phone || !urlFile) {
          showResponse({ error: 'Заполните номер телефона и URL файла' });
          return;
        }
        body = { ...base, chatId: phone + '@c.us', urlFile };
      }

      try {
        const resp = await fetch('/api/' + method, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        showResponse(data);
      } catch (err) {
        showResponse({ error: err.message });
      }
    }
  </script>
</body>
</html>
